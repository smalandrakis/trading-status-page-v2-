<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BTC Trading Bots - Live Status</title>
    <style>
        body { font-family: monospace; max-width: 1200px; margin: 20px auto; background: #1a1a1a; color: #e0e0e0; }
        h1 { text-align: center; color: #4CAF50; }
        .bot { border: 1px solid #444; padding: 20px; margin: 20px 0; background: #2a2a2a; border-radius: 8px; }
        .running { border-left: 5px solid #4CAF50; }
        .stopped { border-left: 5px solid #f44336; }
        .status-badge { display: inline-block; padding: 5px 10px; border-radius: 4px; font-weight: bold; margin-left: 10px; }
        .status-running { background: #4CAF50; color: white; }
        .status-stopped { background: #f44336; color: white; }
        .trades { font-size: 12px; margin-top: 10px; }
        .trade-row { padding: 5px; margin: 2px 0; border-radius: 3px; }
        .win { background: rgba(76, 175, 80, 0.2); color: #4CAF50; }
        .loss { background: rgba(244, 67, 54, 0.2); color: #f44336; }
        .config-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 10px 0; }
        .config-item { background: #333; padding: 8px; border-radius: 4px; }
        .perf-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin: 10px 0; }
        .perf-item { background: #333; padding: 10px; border-radius: 4px; text-align: center; }
        .perf-value { font-size: 24px; font-weight: bold; color: #4CAF50; }
        .perf-label { font-size: 12px; color: #888; }
        .last-update { text-align: center; color: #888; font-size: 14px; margin-bottom: 20px; }
        .signal-box {
            background: #333;
            border: 1px solid #444;
            padding: 15px;
            border-radius: 8px;
            margin: 10px 0;
        }
        .signal-display {
            font-size: 18px;
            font-weight: bold;
            margin: 5px 0;
        }
        .confidence-bar {
            width: 100%;
            height: 20px;
            background: #1a1a1a;
            border-radius: 10px;
            overflow: hidden;
            margin: 5px 0;
        }
        .confidence-fill {
            height: 100%;
            background: linear-gradient(90deg, #4CAF50, #2196F3);
            transition: width 0.3s ease;
        }
        .position-box {
            background: rgba(76, 175, 80, 0.1);
            border: 1px solid #4CAF50;
            padding: 10px;
            margin: 10px 0;
            border-radius: 4px;
        }
        .position-short {
            background: rgba(244, 67, 54, 0.1);
            border-color: #f44336;
        }
        .position-info {
            font-size: 12px;
            margin: 3px 0;
        }
        .adopted-badge {
            background: #FF9800;
            color: white;
            padding: 2px 6px;
            border-radius: 3px;
            font-size: 11px;
            margin-left: 5px;
        }
        .positive { color: #4CAF50; }
        .negative { color: #f44336; }
        .neutral { color: #888; }
        .mirofish-section {
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            border: 2px solid #4CAF50;
            padding: 20px;
            margin: 20px 0;
            border-radius: 12px;
        }
        .mirofish-title {
            text-align: center;
            font-size: 28px;
            margin-bottom: 20px;
            color: #4CAF50;
            text-shadow: 0 0 10px rgba(76, 175, 80, 0.3);
        }
        .signal-cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 15px;
            margin-top: 15px;
        }
        .signal-card {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid #444;
            border-radius: 8px;
            padding: 15px;
        }
        .signal-card.fresh {
            border-color: #4CAF50;
        }
        .signal-card.stale {
            border-color: #f44336;
            opacity: 0.6;
        }
        .signal-header {
            font-size: 16px;
            font-weight: bold;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .signal-source {
            color: #888;
            font-size: 12px;
        }
        .signal-direction {
            font-size: 24px;
            font-weight: bold;
            margin: 10px 0;
        }
        .signal-stats {
            font-size: 13px;
            color: #aaa;
            margin: 5px 0;
        }
        .signal-reasoning {
            font-size: 12px;
            color: #999;
            margin-top: 10px;
            padding-top: 10px;
            border-top: 1px solid #444;
            font-style: italic;
        }
        .freshness-badge {
            display: inline-block;
            padding: 2px 6px;
            border-radius: 3px;
            font-size: 10px;
            font-weight: bold;
        }
        .freshness-badge.fresh {
            background: #4CAF50;
            color: white;
        }
        .freshness-badge.stale {
            background: #f44336;
            color: white;
        }
    </style>
</head>
<body>
    <h1>🤖 BTC Trading Bots - Live Status</h1>
    <div class="last-update" id="lastUpdate">Loading...</div>
    <div id="binanceStatus" style="text-align: center; padding: 10px; margin: 10px 0; border-radius: 4px;"></div>

    <!-- MiroFish AI Predictions Section -->
    <div id="mirofishSection"></div>

    <div id="bots"></div>

    <script>
        async function loadStatus() {
            try {
                const res = await fetch('bot_status.json?t=' + Date.now());
                const data = await res.json();

                document.getElementById('lastUpdate').textContent =
                    `Last Updated: ${new Date(data.generated_at).toLocaleString()}`;

                // Display MiroFish Predictions
                const mirofishDiv = document.getElementById('mirofishSection');
                if (data.mirofish_predictions && data.mirofish_predictions.status === 'active') {
                    const predictions = data.mirofish_predictions.signals;

                    let signalCardsHtml = '';
                    for (const [key, signal] of Object.entries(predictions)) {
                        const directionClass = signal.direction === 'LONG' ? 'positive' :
                                             signal.direction === 'SHORT' ? 'negative' : 'neutral';
                        const freshnessClass = signal.is_fresh ? 'fresh' : 'stale';
                        const freshnessBadge = signal.is_fresh ?
                            '<span class="freshness-badge fresh">FRESH</span>' :
                            '<span class="freshness-badge stale">STALE</span>';

                        const sourceName = key === 'cerebras' ? '🧠 Cerebras' :
                                         key === 'groq' ? '⚡ Groq' :
                                         '🐟 MiroFish AI';

                        const confidence = (signal.confidence * 100).toFixed(1);
                        const strength = (signal.strength * 100).toFixed(1);
                        const ageMin = Math.floor(signal.age_minutes);

                        signalCardsHtml += `
                            <div class="signal-card ${freshnessClass}">
                                <div class="signal-header">
                                    <span>${sourceName}</span>
                                    ${freshnessBadge}
                                </div>
                                <div class="signal-direction ${directionClass}">
                                    ${signal.direction}
                                </div>
                                <div class="signal-stats">
                                    Confidence: <strong>${confidence}%</strong> |
                                    Strength: <strong>${strength}%</strong>
                                </div>
                                <div class="signal-stats">
                                    Age: ${ageMin} minutes
                                </div>
                                ${signal.reasoning ? `<div class="signal-reasoning">${signal.reasoning}</div>` : ''}
                            </div>
                        `;
                    }

                    mirofishDiv.innerHTML = `
                        <div class="mirofish-section">
                            <div class="mirofish-title">🐟 MiroFish AI Predictions</div>
                            <div class="signal-cards">
                                ${signalCardsHtml}
                            </div>
                        </div>
                    `;
                }

                // Display Binance connection status
                const binanceDiv = document.getElementById('binanceStatus');
                const binance = data.binance_connection;
                if (binance.status === 'connected') {
                    binanceDiv.style.background = 'rgba(76, 175, 80, 0.2)';
                    binanceDiv.style.border = '1px solid #4CAF50';
                    binanceDiv.innerHTML = '✓ Binance API Connected';
                } else {
                    binanceDiv.style.background = 'rgba(244, 67, 54, 0.2)';
                    binanceDiv.style.border = '1px solid #f44336';
                    binanceDiv.innerHTML = `⚠️ Binance API ${binance.status.toUpperCase()}: ${binance.message}<br><small>Bots cannot generate signals without Binance connection</small>`;
                }

                const botsDiv = document.getElementById('bots');
                botsDiv.innerHTML = '';

                data.bots.forEach(bot => {
                    const statusClass = bot.status === 'running' ? 'running' : 'stopped';
                    const statusBadgeClass = bot.status === 'running' ? 'status-running' : 'status-stopped';

                    // Current signal
                    const signal = bot.current_signal || {};
                    const signalClass = signal.signal === 'LONG' ? 'positive' :
                                       signal.signal === 'SHORT' ? 'negative' : 'neutral';
                    const confidence = signal.confidence || 0;

                    // Open position
                    const position = bot.open_position;
                    const positionHtml = position ? `
                        <div class="position-box ${position.direction === 'SHORT' ? 'position-short' : ''}">
                            <div style="font-weight: bold; margin-bottom: 5px;">
                                📍 OPEN POSITION: ${position.direction} ${position.size}x
                                ${position.adopted ? '<span class="adopted-badge">ADOPTED</span>' : ''}
                            </div>
                            <div class="position-info">Entry: $${position.entry_price.toFixed(2)}</div>
                            <div class="position-info">TP: $${position.tp_price.toFixed(2)} | SL: $${position.sl_price.toFixed(2)}</div>
                            <div class="position-info">Opened: ${position.entry_time}</div>
                        </div>
                    ` : '<div style="color: #888; padding: 10px;">No open position</div>';

                    const recentTrades = bot.recent_trades.length > 0
                        ? bot.recent_trades.map(t => `
                            <div class="trade-row ${t.pnl > 0 ? 'win' : 'loss'}">
                                ${t.time} | ${t.direction} | ${t.pnl > 0 ? '+' : ''}$${t.pnl.toFixed(2)} (${t.pnl_pct > 0 ? '+' : ''}${t.pnl_pct.toFixed(2)}%) | ${t.hold_minutes}min
                            </div>
                        `).join('')
                        : '<div style="color: #888; padding: 10px;">No trades yet</div>';

                    botsDiv.innerHTML += `
                        <div class="bot ${statusClass}">
                            <h2>
                                ${bot.name}
                                <span class="status-badge ${statusBadgeClass}">${bot.status.toUpperCase()}</span>
                            </h2>
                            <p style="color: #888; font-size: 12px;">Last Update: ${bot.last_update}</p>

                            <h3 style="margin-top: 20px;">🎯 Current Signal</h3>
                            <div class="signal-box">
                                <div class="signal-display">
                                    <span class="${signalClass}">${signal.signal || 'UNKNOWN'}</span>
                                    <span style="color: #888; font-size: 14px; margin-left: 10px;">${confidence.toFixed(1)}%</span>
                                </div>
                                <div class="confidence-bar">
                                    <div class="confidence-fill" style="width: ${confidence}%"></div>
                                </div>
                                <div style="font-size: 11px; color: #666; margin-top: 5px;">
                                    LONG ≥ ${bot.config.long_threshold * 100}% | SHORT ≤ ${bot.config.short_threshold * 100}%
                                </div>
                            </div>

                            <h3 style="margin-top: 20px;">💼 Position Status</h3>
                            ${positionHtml}

                            <h3 style="margin-top: 20px;">⚙️ Configuration</h3>
                            <div class="config-grid">
                                <div class="config-item">
                                    <strong>TP/SL:</strong> ${bot.config.tp_pct}% / ${bot.config.sl_pct}%
                                </div>
                                <div class="config-item">
                                    <strong>Thresholds:</strong> L=${bot.config.long_threshold} / S=${bot.config.short_threshold}
                                </div>
                                <div class="config-item">
                                    <strong>Expected Frequency:</strong> ${bot.config.expected_trades_per_week} trades/week
                                </div>
                                <div class="config-item">
                                    <strong>Expected Win Rate:</strong> ${bot.config.expected_win_rate}%
                                </div>
                            </div>
                            <div style="background: #333; padding: 8px; border-radius: 4px; margin-top: 5px;">
                                <strong>Expected P&L (2yr):</strong> $${bot.config.expected_pnl_2yr.toLocaleString()}
                            </div>

                            <h3 style="margin-top: 20px;">📊 Performance</h3>
                            <div class="perf-grid">
                                <div class="perf-item">
                                    <div class="perf-value">${bot.performance.total_trades}</div>
                                    <div class="perf-label">Total Trades</div>
                                </div>
                                <div class="perf-item">
                                    <div class="perf-value" style="color: ${bot.performance.win_rate >= 50 ? '#4CAF50' : '#f44336'}">
                                        ${bot.performance.win_rate.toFixed(1)}%
                                    </div>
                                    <div class="perf-label">Win Rate (${bot.performance.wins}W / ${bot.performance.losses}L)</div>
                                </div>
                                <div class="perf-item">
                                    <div class="perf-value" style="color: ${bot.performance.total_pnl >= 0 ? '#4CAF50' : '#f44336'}">
                                        $${bot.performance.total_pnl.toFixed(2)}
                                    </div>
                                    <div class="perf-label">Total P&L (Avg: $${bot.performance.avg_pnl.toFixed(2)})</div>
                                </div>
                            </div>

                            <h3 style="margin-top: 20px;">📝 Recent Trades (Last 10)</h3>
                            <div class="trades">${recentTrades}</div>
                        </div>
                    `;
                });
            } catch (error) {
                document.getElementById('bots').innerHTML = `
                    <div style="color: #f44336; text-align: center; padding: 40px;">
                        <h2>⚠️ Error Loading Status</h2>
                        <p>${error.message}</p>
                    </div>
                `;
            }
        }

        loadStatus();
        setInterval(loadStatus, 60000); // Refresh every minute
    </script>
</body>
</html>
