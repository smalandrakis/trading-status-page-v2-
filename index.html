<!DOCTYPE html>
<html>
<head>
    <title>BTC Trading Bots Status</title>
    <style>
        body { font-family: monospace; max-width: 1200px; margin: 20px auto; background: #1a1a1a; color: #e0e0e0; }
        h1 { text-align: center; color: #4CAF50; }
        .bot { border: 1px solid #444; padding: 20px; margin: 20px 0; background: #2a2a2a; border-radius: 8px; }
        .running { border-left: 5px solid #4CAF50; }
        .stopped { border-left: 5px solid #f44336; }
        .status-badge { display: inline-block; padding: 5px 10px; border-radius: 4px; font-weight: bold; margin-left: 10px; }
        .status-running { background: #4CAF50; color: white; }
        .status-stopped { background: #f44336; color: white; }
        .trades { font-size: 12px; margin-top: 10px; }
        .trade-row { padding: 5px; margin: 2px 0; border-radius: 3px; }
        .win { background: rgba(76, 175, 80, 0.2); color: #4CAF50; }
        .loss { background: rgba(244, 67, 54, 0.2); color: #f44336; }
        .config-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 10px 0; }
        .config-item { background: #333; padding: 8px; border-radius: 4px; }
        .perf-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin: 10px 0; }
        .perf-item { background: #333; padding: 10px; border-radius: 4px; text-align: center; }
        .perf-value { font-size: 24px; font-weight: bold; color: #4CAF50; }
        .perf-label { font-size: 12px; color: #888; }
        .last-update { text-align: center; color: #888; font-size: 14px; margin-bottom: 20px; }
    </style>
</head>
<body>
    <h1>🤖 BTC Trading Bots - Live Status</h1>
    <div class="last-update" id="lastUpdate">Loading...</div>
    <div id="bots"></div>

    <script>
        async function loadStatus() {
            try {
                const res = await fetch('bot_status.json');
                const data = await res.json();

                document.getElementById('lastUpdate').textContent =
                    `Last Updated: ${new Date(data.generated_at).toLocaleString()}`;

                const botsDiv = document.getElementById('bots');
                botsDiv.innerHTML = '';

                data.bots.forEach(bot => {
                    const statusClass = bot.status === 'running' ? 'running' : 'stopped';
                    const statusBadgeClass = bot.status === 'running' ? 'status-running' : 'status-stopped';

                    const recentTrades = bot.recent_trades.length > 0
                        ? bot.recent_trades.map(t => `
                            <div class="trade-row ${t.pnl > 0 ? 'win' : 'loss'}">
                                ${t.time} | ${t.direction} | ${t.pnl > 0 ? '+' : ''}$${t.pnl.toFixed(2)} (${t.pnl_pct > 0 ? '+' : ''}${t.pnl_pct.toFixed(2)}%) | ${t.hold_minutes}min
                            </div>
                        `).join('')
                        : '<div style="color: #888; padding: 10px;">No trades yet</div>';

                    botsDiv.innerHTML += `
                        <div class="bot ${statusClass}">
                            <h2>
                                ${bot.name}
                                <span class="status-badge ${statusBadgeClass}">${bot.status.toUpperCase()}</span>
                            </h2>
                            <p style="color: #888; font-size: 12px;">Last Update: ${bot.last_update}</p>

                            <h3 style="margin-top: 20px;">⚙️ Configuration</h3>
                            <div class="config-grid">
                                <div class="config-item">
                                    <strong>TP/SL:</strong> ${bot.config.tp_pct}% / ${bot.config.sl_pct}%
                                </div>
                                <div class="config-item">
                                    <strong>Thresholds:</strong> L=${bot.config.long_threshold} / S=${bot.config.short_threshold}
                                </div>
                                <div class="config-item">
                                    <strong>Expected Frequency:</strong> ${bot.config.expected_trades_per_week} trades/week
                                </div>
                                <div class="config-item">
                                    <strong>Expected Win Rate:</strong> ${bot.config.expected_win_rate}%
                                </div>
                            </div>
                            <div style="background: #333; padding: 8px; border-radius: 4px; margin-top: 5px;">
                                <strong>Expected P&L (2yr):</strong> $${bot.config.expected_pnl_2yr.toLocaleString()}
                            </div>

                            <h3 style="margin-top: 20px;">📊 Performance</h3>
                            <div class="perf-grid">
                                <div class="perf-item">
                                    <div class="perf-value">${bot.performance.total_trades}</div>
                                    <div class="perf-label">Total Trades</div>
                                </div>
                                <div class="perf-item">
                                    <div class="perf-value" style="color: ${bot.performance.win_rate >= 50 ? '#4CAF50' : '#f44336'}">
                                        ${bot.performance.win_rate.toFixed(1)}%
                                    </div>
                                    <div class="perf-label">Win Rate (${bot.performance.wins}W / ${bot.performance.losses}L)</div>
                                </div>
                                <div class="perf-item">
                                    <div class="perf-value" style="color: ${bot.performance.total_pnl >= 0 ? '#4CAF50' : '#f44336'}">
                                        $${bot.performance.total_pnl.toFixed(2)}
                                    </div>
                                    <div class="perf-label">Total P&L (Avg: $${bot.performance.avg_pnl.toFixed(2)})</div>
                                </div>
                            </div>

                            <h3 style="margin-top: 20px;">📝 Recent Trades (Last 10)</h3>
                            <div class="trades">${recentTrades}</div>
                        </div>
                    `;
                });
            } catch (error) {
                document.getElementById('bots').innerHTML = `
                    <div style="color: #f44336; text-align: center; padding: 40px;">
                        <h2>⚠️ Error Loading Status</h2>
                        <p>${error.message}</p>
                    </div>
                `;
            }
        }

        loadStatus();
        setInterval(loadStatus, 60000); // Refresh every minute
    </script>
</body>
</html>
