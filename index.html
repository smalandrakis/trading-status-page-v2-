<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BTC Trading Bots - Live Status</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); min-height: 100vh; }
        .card { background: rgba(255,255,255,0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
        .positive { color: #10b981; }
        .negative { color: #ef4444; }
    </style>
</head>
<body class="text-white p-4 md:p-8">
    <div class="max-w-7xl mx-auto">
        <!-- Header -->
        <div class="text-center mb-8">
            <h1 class="text-4xl font-bold mb-2">₿ BTC Trading Bots</h1>
            <p class="text-gray-400">Live Paper Trading Status</p>
            <div id="lastUpdate" class="text-sm text-gray-500 mt-2"></div>
        </div>

        <!-- Bot Cards -->
        <div id="botsContainer" class="grid grid-cols-1 lg:grid-cols-2 gap-6 mb-8"></div>
    </div>

    <script>
        async function loadStatus() {
            try {
                const response = await fetch('bot_status.json');
                const data = await response.json();

                // Update timestamp
                const timestamp = new Date(data.generated_at).toLocaleString();
                document.getElementById('lastUpdate').textContent = `Last updated: ${timestamp}`;

                // Render bots
                const container = document.getElementById('botsContainer');
                container.innerHTML = data.bots.map(bot => `
                    <div class="card rounded-xl p-6">
                        <!-- Bot Header -->
                        <div class="flex items-center justify-between mb-6">
                            <div>
                                <h2 class="text-2xl font-bold">${bot.name}</h2>
                                <div class="flex items-center mt-2">
                                    <span class="w-3 h-3 rounded-full ${bot.status === 'running' ? 'bg-green-500' : 'bg-red-500'} mr-2"></span>
                                    <span class="text-sm uppercase">${bot.status}</span>
                                </div>
                            </div>
                        </div>

                        <!-- Configuration -->
                        <div class="grid grid-cols-2 gap-4 mb-6 text-sm">
                            <div>
                                <div class="text-gray-400">TP / SL</div>
                                <div class="text-lg font-mono">${bot.config.tp_pct}% / ${bot.config.sl_pct}%</div>
                            </div>
                            <div>
                                <div class="text-gray-400">Thresholds</div>
                                <div class="text-lg font-mono">${bot.config.long_threshold} / ${bot.config.short_threshold}</div>
                            </div>
                        </div>

                        <!-- Performance -->
                        <div class="bg-black bg-opacity-30 rounded-lg p-4 mb-6">
                            <div class="grid grid-cols-3 gap-4 text-center">
                                <div>
                                    <div class="text-gray-400 text-xs mb-1">Total Trades</div>
                                    <div class="text-2xl font-bold">${bot.performance.total_trades}</div>
                                </div>
                                <div>
                                    <div class="text-gray-400 text-xs mb-1">Win Rate</div>
                                    <div class="text-2xl font-bold">${bot.performance.win_rate.toFixed(1)}%</div>
                                </div>
                                <div>
                                    <div class="text-gray-400 text-xs mb-1">Total P&L</div>
                                    <div class="text-2xl font-bold ${bot.performance.total_pnl >= 0 ? 'positive' : 'negative'}">
                                        $${bot.performance.total_pnl.toFixed(0)}
                                    </div>
                                </div>
                            </div>
                            <div class="mt-4 pt-4 border-t border-gray-700">
                                <div class="flex justify-between text-sm">
                                    <span class="text-gray-400">Wins / Losses</span>
                                    <span>${bot.performance.wins} / ${bot.performance.losses}</span>
                                </div>
                                <div class="flex justify-between text-sm mt-2">
                                    <span class="text-gray-400">Avg P&L/trade</span>
                                    <span class="${bot.performance.avg_pnl >= 0 ? 'positive' : 'negative'}">
                                        $${bot.performance.avg_pnl.toFixed(2)}
                                    </span>
                                </div>
                            </div>
                        </div>

                        <!-- Recent Trades -->
                        <div>
                            <h3 class="text-lg font-semibold mb-3">Recent Trades</h3>
                            <div class="space-y-2">
                                ${bot.recent_trades.slice(0, 5).map(trade => `
                                    <div class="flex justify-between items-center text-sm bg-black bg-opacity-20 rounded p-2">
                                        <span class="text-gray-400">${new Date(trade.time).toLocaleString()}</span>
                                        <span class="font-semibold">${trade.direction}</span>
                                        <span class="${trade.pnl >= 0 ? 'positive' : 'negative'} font-mono">
                                            ${trade.pnl >= 0 ? '+' : ''}$${trade.pnl.toFixed(2)}
                                        </span>
                                        <span class="text-gray-500">(${(trade.hold_minutes / 60).toFixed(1)}h)</span>
                                    </div>
                                `).join('')}
                            </div>
                        </div>

                        <!-- Expected Performance -->
                        <div class="mt-6 pt-6 border-t border-gray-700">
                            <h3 class="text-sm text-gray-400 mb-2">Expected (Backtest)</h3>
                            <div class="text-xs text-gray-500">
                                ${bot.config.expected_trades_per_week} trades/week •
                                ${bot.config.expected_win_rate}% WR •
                                $${bot.config.expected_pnl_2yr.toLocaleString()} / 2yr
                            </div>
                        </div>
                    </div>
                `).join('');

            } catch (error) {
                console.error('Error loading status:', error);
                document.getElementById('botsContainer').innerHTML = `
                    <div class="card rounded-xl p-6 text-center">
                        <p class="text-red-400">Error loading bot status</p>
                    </div>
                `;
            }
        }

        // Load immediately and refresh every 2 minutes
        loadStatus();
        setInterval(loadStatus, 120000);
    </script>
</body>
</html>
